<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 360" role="img" aria-label="Animation showing three email senders converging through SimpleLogin into a single encrypted Proton inbox">
  <title>Email alias flow</title>
  <desc>Three senders on the left send emails through a central SimpleLogin hub, which forwards them to a single encrypted Proton inbox on the right.</desc>

  <defs>
    <style>
      .bg { fill: #0a0e0b; }
      .lbl { font-family: 'IBM Plex Mono', 'Courier New', monospace; font-size: 11px; letter-spacing: 0.08em; fill: #94a3b8; }
      .lbl-sender { fill: #fca5a5; }
      .lbl-hub { fill: #93c5fd; font-size: 12px; }
      .lbl-vault { fill: #86efac; }
      .sub { font-family: 'IBM Plex Mono', 'Courier New', monospace; font-size: 9px; letter-spacing: 0.05em; fill: #475569; }
      .caption { font-family: 'IBM Plex Mono', 'Courier New', monospace; font-size: 10px; letter-spacing: 0.15em; text-transform: uppercase; fill: #64748b; }
      .envelope { fill: none; stroke: #60a5fa; stroke-width: 0.75; }
      .envelope-out { fill: none; stroke: #4ade80; stroke-width: 0.75; }

      @keyframes envelope-1 {
        0%   { transform: translate(130px, 98px);  opacity: 0; }
        8%   { opacity: 1; }
        32%  { transform: translate(310px, 188px); opacity: 1; }
        40%, 100% { transform: translate(310px, 188px); opacity: 0; }
      }
      @keyframes envelope-2 {
        0%, 5% { transform: translate(130px, 188px); opacity: 0; }
        13%  { opacity: 1; }
        37%  { transform: translate(310px, 188px); opacity: 1; }
        45%, 100% { transform: translate(310px, 188px); opacity: 0; }
      }
      @keyframes envelope-3 {
        0%, 10% { transform: translate(130px, 278px); opacity: 0; }
        18% { opacity: 1; }
        42% { transform: translate(310px, 188px); opacity: 1; }
        50%, 100% { transform: translate(310px, 188px); opacity: 0; }
      }
      @keyframes envelope-out {
        0%, 50% { transform: translate(310px, 188px); opacity: 0; }
        55% { opacity: 1; }
        85% { transform: translate(540px, 188px); opacity: 1; }
        92%, 100% { transform: translate(540px, 188px); opacity: 0; }
      }
      @keyframes hub-pulse {
        0%, 100% { opacity: 0.25; }
        35%, 45% { opacity: 0.6; }
      }
      @keyframes vault-glow {
        0%, 50% { opacity: 0.1; }
        65%, 85% { opacity: 0.3; }
        100% { opacity: 0.1; }
      }
      @keyframes caret-blink {
        0%, 50% { opacity: 1; }
        51%, 100% { opacity: 0; }
      }

      .env-1 { animation: envelope-1 8s ease-in-out infinite; }
      .env-2 { animation: envelope-2 8s ease-in-out infinite; }
      .env-3 { animation: envelope-3 8s ease-in-out infinite; }
      .env-out { animation: envelope-out 8s ease-in-out infinite; }
      .hub-ring-pulse { animation: hub-pulse 8s ease-in-out infinite; }
      .vault-glow-anim { animation: vault-glow 8s ease-in-out infinite; }
      .caret { animation: caret-blink 1.2s step-end infinite; }

      @media (prefers-reduced-motion: reduce) {
        .env-1, .env-2, .env-3, .env-out, .hub-ring-pulse, .vault-glow-anim, .caret {
          animation: none;
        }
        .env-1, .env-2, .env-3 { transform: translate(310px, 188px); opacity: 0.5; }
        .env-out { transform: translate(540px, 188px); opacity: 0.5; }
        .vault-glow-anim { opacity: 0.2; }
        .hub-ring-pulse { opacity: 0.4; }
      }
    </style>
  </defs>

  <rect class="bg" width="680" height="360"/>

  <text x="40" y="32" class="caption">▶<tspan class="caret">_</tspan><tspan dx="8">ALIAS FLOW — HOW THE VAULT STAYS INVISIBLE</tspan></text>
  <line x1="40" y1="48" x2="640" y2="48" stroke="#1e2e2a" stroke-width="0.5"/>

  <g opacity="0.5">
    <line x1="155" y1="98"  x2="310" y2="188" stroke="#f87171" stroke-width="0.5" stroke-dasharray="2 3" opacity="0.25"/>
    <line x1="155" y1="188" x2="310" y2="188" stroke="#f87171" stroke-width="0.5" stroke-dasharray="2 3" opacity="0.25"/>
    <line x1="155" y1="278" x2="310" y2="188" stroke="#f87171" stroke-width="0.5" stroke-dasharray="2 3" opacity="0.25"/>
    <line x1="370" y1="188" x2="540" y2="188" stroke="#4ade80" stroke-width="0.5" stroke-dasharray="2 3" opacity="0.25"/>
  </g>

  <g>
    <rect x="40" y="78"  width="115" height="40" rx="2" fill="#0f1610" stroke="#7f1d1d" stroke-width="0.5"/>
    <text x="52" y="95"  class="lbl lbl-sender">SHOP</text>
    <text x="52" y="110" class="sub">shop-x9k@…</text>
  </g>
  <g>
    <rect x="40" y="168" width="115" height="40" rx="2" fill="#0f1610" stroke="#7f1d1d" stroke-width="0.5"/>
    <text x="52" y="185" class="lbl lbl-sender">BANK</text>
    <text x="52" y="200" class="sub">bank-2m4p@…</text>
  </g>
  <g>
    <rect x="40" y="258" width="115" height="40" rx="2" fill="#0f1610" stroke="#7f1d1d" stroke-width="0.5"/>
    <text x="52" y="275" class="lbl lbl-sender">NEWSLETTER</text>
    <text x="52" y="290" class="sub">news7-r3k@…</text>
  </g>

  <circle cx="340" cy="188" r="58" fill="none" stroke="#1e3a5f" stroke-width="0.5" opacity="0.5"/>
  <circle cx="340" cy="188" r="48" fill="none" stroke="#1e3a5f" stroke-width="0.5" opacity="0.4"/>
  <circle class="hub-ring-pulse" cx="340" cy="188" r="38" fill="#60a5fa" opacity="0.25"/>
  <circle cx="340" cy="188" r="30" fill="#0f1610" stroke="#60a5fa" stroke-width="0.75"/>
  <text x="340" y="186" class="lbl lbl-hub" text-anchor="middle">SIMPLE</text>
  <text x="340" y="200" class="lbl lbl-hub" text-anchor="middle">LOGIN</text>

  <g>
    <rect class="vault-glow-anim" x="518" y="148" width="110" height="80" rx="2" fill="#4ade80" opacity="0.1"/>
    <rect x="528" y="158" width="90" height="60" rx="2" fill="#0f1610" stroke="#166534" stroke-width="0.75"/>
    <g transform="translate(573, 178)">
      <rect x="-9" y="2" width="18" height="14" rx="1" fill="none" stroke="#4ade80" stroke-width="0.75"/>
      <path d="M -6 2 L -6 -3 A 6 6 0 0 1 6 -3 L 6 2" fill="none" stroke="#4ade80" stroke-width="0.75"/>
      <circle cx="0" cy="9" r="1.5" fill="#4ade80"/>
    </g>
    <text x="573" y="207" class="lbl lbl-vault" text-anchor="middle">PROTON VAULT</text>
  </g>

  <g class="env-1">
    <rect class="envelope" x="-8" y="-5" width="16" height="10" rx="0.5"/>
    <polyline class="envelope" points="-8,-5 0,1 8,-5"/>
  </g>
  <g class="env-2">
    <rect class="envelope" x="-8" y="-5" width="16" height="10" rx="0.5"/>
    <polyline class="envelope" points="-8,-5 0,1 8,-5"/>
  </g>
  <g class="env-3">
    <rect class="envelope" x="-8" y="-5" width="16" height="10" rx="0.5"/>
    <polyline class="envelope" points="-8,-5 0,1 8,-5"/>
  </g>
  <g class="env-out">
    <rect class="envelope-out" x="-8" y="-5" width="16" height="10" rx="0.5"/>
    <polyline class="envelope-out" points="-8,-5 0,1 8,-5"/>
  </g>

  <text x="155" y="130" class="sub" opacity="0.6">→ alias</text>
  <text x="155" y="220" class="sub" opacity="0.6">→ alias</text>
  <text x="155" y="310" class="sub" opacity="0.6">→ alias</text>
  <text x="435" y="180" class="sub" opacity="0.6">→ encrypted</text>
</svg>
